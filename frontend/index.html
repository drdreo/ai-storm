<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ai-storm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Apply the persisted theme choice before first paint to avoid a flash
      // (#77). Kept in sync with src/app/stores/theme.store.ts.
      (function () {
        try {
          var m = localStorage.getItem('ai-storm.theme') || 'system'
          var dark =
            m === 'dark' ||
            (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          var root = document.documentElement
          root.classList.toggle('dark', dark)
          root.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <link rel="icon" href="/assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
